<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Breakdown Takedown</title>
  <script type="text/javascript">
    // SPA fallback for GitHub Pages.
    // GitHub Pages serves this file for any request under /breakdowntakedown/
    // that does not match a real file. It rewrites the requested path into a
    // query string and redirects to index.html, where a matching snippet
    // restores the real URL via history.replaceState before Flutter boots.
    // Based on https://github.com/rafgraph/spa-github-pages (MIT).
    //
    // pathSegmentsToKeep = 1 because the app lives at /breakdowntakedown/ on
    // the McCannDahl.github.io user-pages site; we want to preserve that
    // segment and only rewrite what comes after it.
    var pathSegmentsToKeep = 1;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        #timer {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 22px;
        }

        #challengeBox {
            max-width: 420px;
            margin: auto;
            padding: 20px;
        }

        button {
            padding: 12px 20px;
            margin: 8px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 80%;
        }

        #radar {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        #arrow {
            font-size: 120px;
        }

        #compass {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
        }

        #restartBtn {
            display: none;
            background: #c33;
            color: white;
        }
    </style>
</head>

<body>

    <div id="timer"></div>

    <div id="compass">
        <div id="compassArrow">↑</div>
    </div>

    <button id="startBtn">Start</button>
    <button id="restartBtn">Restart</button>

    <div id="radar" style="display:none">
        <div id="arrow">↑</div>
    </div>

    <div id="challengeBox"></div>

    <script>
        const TOTAL_TIME = 90 // total minutes
        const ARRIVAL_DISTANCE = 5
        const MAX_RADAR_DISTANCE = 30

        let challenges = []
        let photoTaken = false

        let startTime = Number(localStorage.getItem("startTime")) || null
        let currentChallengeId = Number(localStorage.getItem("currentChallengeId")) || 1

        let heading = 0
        let gpsHeading = null
        let userPosition = null

        const arrow = document.getElementById("arrow")
        const radar = document.getElementById("radar")
        const compassArrow = document.getElementById("compassArrow")
        const startBtn = document.getElementById("startBtn")
        const restartBtn = document.getElementById("restartBtn")
        const challengeBox = document.getElementById("challengeBox")
        const timerEl = document.getElementById("timer")

        // ---------------- CHALLENGE LOGIC ----------------
        function getChallenge(id) {
            return challenges.find(c => c.challengeId == id)
        }

        function remainingMinutes() {
            if (!startTime) return TOTAL_TIME
            const elapsed = (Date.now() - startTime) / 60000
            return TOTAL_TIME - elapsed
        }

        function estimateRemainingTime(id) {
            let total = 0
            let c = getChallenge(id)
            while (c) {
                total += c.expectedMinutes
                if (c.nextChallenge)
                    c = getChallenge(c.nextChallenge)
                else break
            }
            return total
        }

        function maybeSkip(challenge) {
            let remain = remainingMinutes()
            let required = estimateRemainingTime(challenge.challengeId)
            if (remain < required && challenge.priority > 1) {
                if (challenge.nextChallenge)
                    return getChallenge(challenge.nextChallenge)
            }
            return challenge
        }
        function handlePhotoUpload() {
            if (!photoTaken) {
                alert("Please take a photo before continuing.")
                return
            }
            completeChallenge()
        }


        function showChallenge() {
            let challenge = getChallenge(currentChallengeId)
            challenge = maybeSkip(challenge)
            if (!challenge) return

            currentChallengeId = challenge.challengeId
            localStorage.setItem("currentChallengeId", currentChallengeId)

            challengeBox.innerHTML = `
    <h2>${challenge.title}</h2>
    <p>${challenge.description}</p>
  `

            // Show/Hide radar arrow depending on challenge GPS
            if (challenge.lat && challenge.lon) {
                radar.style.display = "flex"
            } else {
                radar.style.display = "none"
            }

            restartBtn.style.display = "inline-block"

            if (challenge.answer) {
                challengeBox.innerHTML += `
      <input id="answerBox" placeholder="Type answer here">
      <button onclick="submitAnswer('${challenge.answer}')">Submit</button>
    `
            }

            if (challenge.mustUploadPicture) {
                challengeBox.innerHTML += `
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
        <button id="openCameraBtn" onclick="openCamera()">📷 Open Camera</button>
        <br><br>
        <button id="uploadBtn" disabled onclick="handlePhotoUpload()">Submit Photo</button>
    `
            }

            if (challenge.options) {
                challenge.options.forEach(o => {
                    let btn = document.createElement("button")
                    btn.innerText = o.text
                    btn.onclick = () => goTo(o.challengeId ?? currentChallengeId + 1)
                    challengeBox.appendChild(btn)
                })
            } else if (!challenge.answer && !challenge.mustUploadPicture) {
                let btn = document.createElement("button")
                btn.innerText = "Continue"
                btn.id = "continueBtn"
                btn.onclick = completeChallenge
                challengeBox.appendChild(btn)
            }
        }

        function submitAnswer(correct) {
            let val = document.getElementById("answerBox").value.trim().toLowerCase()
            if (val === correct.toLowerCase())
                completeChallenge()
            else
                alert("Try again")
        }

        function completeChallenge() {
            let challenge = getChallenge(currentChallengeId)

            // 📸 Enforce photo upload
            if (challenge.mustUploadPicture) {
                if (!photoTaken) {
                    alert("You must take a photo to continue.")
                    return
                }
            }

            // 🚨 Enforce GPS proximity if required
            if (challenge.lat && challenge.lon) {
                if (!userPosition) {
                    alert("Waiting for GPS signal...")
                    return
                }

                let target = { lat: challenge.lat, lon: challenge.lon }
                let dist = distanceMeters(userPosition, target)

                if (dist > ARRIVAL_DISTANCE) {
                    alert(`You need to get closer! (${Math.round(dist)}m away)`)
                    return
                }
            }

            // ✅ proceed normally
            let nextId = challenge.nextChallenge ?? (challenge.challengeId + 1)
            let nextChallenge = getChallenge(nextId)
            if (nextChallenge)
                goTo(nextId)
            else
                challengeBox.innerHTML = "<h2>🎉 You did it!</h2>"
        }
        const goToBase = (id) => {
            currentChallengeId = id
            localStorage.setItem("currentChallengeId", id)
            showChallenge()
        }

        // ---------------- TIMER ----------------
        function updateTimer() {
            let remain = remainingMinutes()
            if (remain <= 0) {
                timerEl.innerText = "Time Up!"
                return
            }
            let m = Math.floor(remain)
            let s = Math.floor((remain - m) * 60)
            timerEl.innerText = `${m}:${s.toString().padStart(2, '0')}`
        }
        setInterval(updateTimer, 1000)

        // ---------------- GPS/COMPASS ----------------
        function toRad(d) { return d * Math.PI / 180 }
        function distanceMeters(a, b) {
            const R = 6371000
            const dLat = toRad(b.lat - a.lat)
            const dLon = toRad(b.lon - a.lon)
            const lat1 = toRad(a.lat)
            const lat2 = toRad(b.lat)
            const x = Math.sin(dLat / 2) ** 2 + Math.sin(dLon / 2) ** 2 * Math.cos(lat1) * Math.cos(lat2)
            const c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x))
            return R * c
        }
        function bearing(a, b) {
            const lat1 = toRad(a.lat)
            const lat2 = toRad(b.lat)
            const dLon = toRad(b.lon - a.lon)
            const y = Math.sin(dLon) * Math.cos(lat2)
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon)
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360
        }
        function angleDiff(a, b) { return ((b - a + 540) % 360) - 180 }


        function updateNavigation() {
            if (!userPosition) return
            let challenge = getChallenge(currentChallengeId)

            let distDisplay = document.getElementById("distanceIndicator")
            if (!distDisplay && document.getElementById("radar")) {
                distDisplay = document.createElement("div")
                distDisplay.id = "distanceIndicator"
                distDisplay.style.fontSize = "22px"
                distDisplay.style.fontWeight = "bold"
                distDisplay.style.margin = "15px auto"
                document.getElementById("radar").insertAdjacentElement('afterend', distDisplay)
            }

            if (!challenge.lat || !challenge.lon) {
                arrow.style.display = "none"
                if (distDisplay) distDisplay.style.display = "none"
                document.body.style.background = "#111"
                return
            }
            arrow.style.display = "block"
            if (distDisplay) distDisplay.style.display = "block"

            let target = { lat: challenge.lat, lon: challenge.lon }
            let dist = distanceMeters(userPosition, target)

            if (distDisplay) {
                distDisplay.innerText = `You're ${Math.round(dist)}m away`
            }

            // Smooth gradient background based on distance
            let lightness = Math.max(10, 50 - ((dist - ARRIVAL_DISTANCE) / (MAX_RADAR_DISTANCE - ARRIVAL_DISTANCE)) * 40)
            if (dist > MAX_RADAR_DISTANCE) lightness = 10
            if (dist <= ARRIVAL_DISTANCE) lightness = 50
            document.body.style.background = `radial-gradient(circle at center, hsl(120, 80%, ${lightness}%), #111)`
            document.body.style.backgroundAttachment = "fixed"

            let btn = document.getElementById("continueBtn")
            if (btn) {
                btn.disabled = dist > ARRIVAL_DISTANCE
            }

            let uploadBtn = document.getElementById("uploadBtn")
            if (uploadBtn) {
                uploadBtn.disabled = (dist > ARRIVAL_DISTANCE) || !photoTaken
            }

            if (dist < ARRIVAL_DISTANCE) {
                navigator.vibrate?.([200, 100, 200])
            }

            let targetBearing = bearing(userPosition, target)
            let activeHeading = heading
            if (gpsHeading && dist > 30) activeHeading = gpsHeading
            let rotation = angleDiff(activeHeading, targetBearing)
            arrow.style.transform = `rotate(${rotation}deg)`
        }

        function handleOrientation(event) {
            let newHeading;

            // iOS: webkitCompassHeading
            if (event.webkitCompassHeading !== undefined) {
                if (event.webkitCompassAccuracy && event.webkitCompassAccuracy > 50) return;
                newHeading = event.webkitCompassHeading; // 0 = north
            }
            // Android/other browsers: use absolute orientation
            else if (event.alpha != null) {
                if (!event.absolute) {
                    // if not absolute, we can't trust alpha for true north
                    return;
                }
                // invert so arrow points north correctly
                newHeading = 360 - event.alpha;
            } else return;

            // smoothing to reduce wobble
            heading = (heading + (newHeading - heading) * 0.1 + 360) % 360;

            // update compass arrow
            compassArrow.style.transform = `rotate(${heading}deg)`;

            // update middle navigation arrow if any
            updateNavigation();
        }

        function startGPS() {
            navigator.geolocation.watchPosition(
                pos => {
                    userPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude }
                    if (pos.coords.heading && pos.coords.speed > 1) gpsHeading = pos.coords.heading
                    updateNavigation()
                },
                err => alert(err.message),
                { enableHighAccuracy: true }
            )
        }

        // ---------------- START APP ----------------
        async function startApp() {
            startBtn.style.display = "none"
            radar.style.display = "flex"

            if (!startTime) {
                startTime = Date.now()
                localStorage.setItem("startTime", startTime)
            }
            const res = await fetch(`challenges.json?v=${Date.now()}`, {
                cache: "no-store"
            })
            challenges = await res.json()

            showChallenge()
            startGPS()
            window.addEventListener("deviceorientationabsolute", handleOrientation, true)
            window.addEventListener("deviceorientation", handleOrientation, true)
        }

        // ---------------- RESTART APP ----------------
        restartBtn.onclick = () => {
            if (!confirm("Restart?")) return
            localStorage.removeItem("startTime")
            localStorage.removeItem("currentChallengeId")
            startTime = null
            currentChallengeId = 1
            startBtn.style.display = "inline-block"
            restartBtn.style.display = "none"
            radar.style.display = "none"
            let distDisplay = document.getElementById("distanceIndicator")
            if (distDisplay) distDisplay.style.display = "none"
            document.body.style.background = "#111"
            challengeBox.innerHTML = ""
            timerEl.innerText = ""
        }

        startBtn.onclick = startApp

        // Auto-resume if a session is already in progress
        if (startTime) startApp()
        let cameraOpened = false

        function openCamera() {
            const input = document.getElementById("photoInput")
            if (!input) return
            cameraOpened = true
            // When window regains focus after camera is closed, treat it as photo taken
            window.addEventListener("focus", onCameraReturn, { once: true })
            input.click()
        }

        function onCameraReturn() {
            if (!cameraOpened) return
            cameraOpened = false
            markPhotoTaken()
        }

        document.addEventListener("change", (e) => {
            if (e.target.id === "photoInput") {
                // Clear the input immediately so the browser can free the image from memory
                e.target.value = ""
                cameraOpened = false
                window.removeEventListener("focus", onCameraReturn)
                markPhotoTaken()
            }
        })

        function markPhotoTaken() {
            photoTaken = true
            const openBtn = document.getElementById("openCameraBtn")
            if (openBtn) openBtn.innerText = "📷 Retake Photo"
            const btn = document.getElementById("uploadBtn")
            if (btn) {
                let challenge = getChallenge(currentChallengeId)
                if (challenge.lat && challenge.lon && userPosition) {
                    updateNavigation()
                } else {
                    btn.disabled = false
                }
            }
        }

        // Reset photoTaken flag when moving to a new challenge
        function goTo(id) {
            photoTaken = false
            goToBase(id)
        }
    </script>
</body>

</html>
